<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена - Крольчанск</title>
    <link rel="stylesheet" th:href="@{/css/error.css}" href="../../static/css/error.css">
    <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}" href="../../static/images/favicon.ico">
</head>
<body>
<div class="error-container">
    <div class="error-card">
        <div class="error-icon">🔍</div>
        <div class="error-code">404</div>
        <h1 class="error-title">Страница не найдена</h1>
        <p class="error-message">
            К сожалению, запрашиваемая страница не существует или была перемещена.<br>
            Проверьте правильность адреса или вернитесь на главную.
        </p>
        <a href="/" class="btn-home">
            <span>🏠</span> На главную
        </a>
    </div>
</div>
</body>
</html>
