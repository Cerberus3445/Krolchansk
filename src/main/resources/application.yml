spring:
  application:
    name: Krolchansk
  profiles:
    active: prod
  config:
    import: application-prod.yml
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  datasource:
    url: jdbc:sqlite:krolchansk.db
    username: postgres
    password: password
    driver-class-name: org.sqlite.JDBC
  flyway:
    url: jdbc:sqlite:krolchansk.db
    user: postgres
    password: password
    baseline-on-migrate: true
  messages:
    basename: messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 5MB
      enabled: true

server:
  port: 8080