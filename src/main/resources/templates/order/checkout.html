<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оформление заказа — Крольчанск</title>
  <link rel="stylesheet" th:href="@{/css/index.css}" href="../../static/css/index.css">
  <link rel="stylesheet" th:href="@{/css/checkout.css}" href="../../static/css/checkout.css">
  <link rel="icon" type="image/x-icon" th:href="@{/images/favicon.ico}" href="../../static/images/favicon.ico">
</head>
<body>
<header class="site-header">
  <div class="container">
    <div class="site-header__inner">
      <a href="/" class="logo">
        <span class="logo__main">КРОЛЬЧАНСК</span>
        <span class="logo__sub">СОЮЗ фермерских хозяйств</span>
      </a>
      <nav class="nav" id="main-nav" aria-label="Навигация">
        <button class="nav__close" type="button" aria-label="Закрыть меню">
          <span></span><span></span>
        </button>
        <a href="/" class="nav__link">Главная</a>
        <a href="/catalog/categories" class="nav__link active">Категории</a>
        <a href="/catalog/products" class="nav__link">Продукты</a>
        <a href="/order/checkout" class="nav__link">Заказать</a>
        <a href="#contacts" class="nav__link">Контакты</a>
        <a href="/order/checkout" class="nav__cta">Заказать звонок</a>
      </nav>
      <div class="nav__backdrop" aria-hidden="true"></div>
      <button class="header__burger" type="button" aria-label="Открыть меню">
        <span></span><span></span><span></span>
      </button>
      <a href="/order/checkout" class="btn btn--callback">Заказать звонок</a>
    </div>
  </div>
</header>

<main>
  <div class="order-page">
    <div class="order-form-wrap">
      <h2 class="order-form__title">Оформление заказа</h2>

      <form th:action="@{/order/checkout}" th:object="${order}" method="post" class="order-form">
        <div class="order-form__fields">
          <label class="order-form__field">
            <input type="text" th:field="*{contactName}" placeholder="Ваше имя"
                   th:classappend="${#fields.hasErrors('contactName')} ? 'input--error' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('contactName')}" th:errors="*{contactName}"></span>
          </label>
          <label class="order-form__field">
            <input type="tel" th:field="*{contactPhone}" placeholder="Номер телефона"
                   th:classappend="${#fields.hasErrors('contactPhone')} ? 'input--error' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('contactPhone')}" th:errors="*{contactPhone}"></span>
          </label>
          <label class="order-form__field">
            <input type="text" th:field="*{deliveryAddress}" placeholder="Адрес доставки в СПБ"
                   th:classappend="${#fields.hasErrors('deliveryAddress')} ? 'input--error' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('deliveryAddress')}" th:errors="*{deliveryAddress}"></span>
          </label>
          <label class="order-form__field">
            <input type="text" th:field="*{orderDetails}" placeholder="Ваш заказ: число тушек и т.д."
                   th:classappend="${#fields.hasErrors('orderDetails')} ? 'input--error' : ''">
            <span class="error-text" th:if="${#fields.hasErrors('orderDetails')}" th:errors="*{orderDetails}"></span>
          </label>
        </div>

        <div class="order-form__options">
          <div class="order-form__options-row">
            <div class="order-form__options-col">
              <label class="order-form__checkbox"><input type="checkbox" th:field="*{extraCutting}"> доп. разрубка (120р/тушка)</label>
              <label class="order-form__checkbox"><input type="checkbox" th:field="*{vetCertificate}"> вет. свидетельство (650руб)</label>
            </div>
            <div class="order-form__options-col">
              <label class="order-form__checkbox"><input type="checkbox" th:field="*{keepRabbitPaw}"> оставить лапку кролика</label>
              <label class="order-form__checkbox"><input type="checkbox" th:field="*{keepOrgans}"> оставить печень, почки</label>
            </div>
          </div>
          <button type="submit" class="btn btn--submit">Заказать</button>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      </form>
    </div>
  </div>
</main>

<footer id="contacts" class="footer">
  <div class="footer__inner">
    <div class="footer__col footer__col--left">
      <div class="footer__logo-row">
        <a href="/static" class="footer__logo">
          <span class="footer__logo-main">КРОЛЬЧАНСК</span>
          <span class="footer__logo-sub">СОЮЗ фермерских хозяйств</span>
        </a>
        <a href="https://vk.com/krolchansk" class="footer__vk footer__vk--mobile" aria-label="ВКонтакте">
          <img th:src="@{/images/footer-vk.svg}" width="50" height="50" alt="">
        </a>
      </div>
      <div class="footer__contacts">
        <p class="footer__contact-row">
          <span class="footer__contact-label">Телефон: </span>
          <a href="tel:+79213745301">8-921-374-53-01</a>
        </p>
        <p class="footer__contact-row">
          <span class="footer__contact-label">Email: </span>
          <a href="mailto:info@krolchansk.ru">info@krolchansk.ru</a>
        </p>
        <p class="footer__contact-city">г. Санкт-Петербург</p>
      </div>
    </div>
    <div class="footer__col footer__col--center">
      <div class="footer__divider" aria-hidden="true"></div>
      <p class="footer__copy">© Copyright 2014-2026</p>
    </div>
  </div>
</footer>
<script th:src="@{/js/script.js}" src="../../static/js/script.js"></script>
</body>
</html>
